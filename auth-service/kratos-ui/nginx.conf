server {
    listen 80;
    root /usr/share/nginx/html;
    index login.html;

    # Serve .html pages without the extension in the URL
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Prevent caching of HTML so flow data is always fresh
    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
