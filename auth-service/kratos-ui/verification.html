<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0a0a0a; --surface: #111111; --surface2: #1a1a1a; --border: rgba(255,255,255,0.08); --text: #f0f0f0; --muted: #888888; --accent: #6366f1; --accent-hover: #4f52e0; --error: #f87171; --success: #4ade80; --radius: 12px; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; }
    .wordmark { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; width: 100%; max-width: 400px; }
    h1 { font-size: 1.375rem; font-weight: 600; margin-bottom: 0.5rem; }
    .subtitle { font-size: 0.875rem; color: var(--muted); margin-bottom: 1.5rem; line-height: 1.5; }
    .field { margin-bottom: 1.125rem; }
    label { display: block; font-size: 0.8125rem; font-weight: 500; color: var(--muted); margin-bottom: 0.375rem; }
    input[type=text] { width: 100%; padding: 0.6875rem 0.875rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 1.25rem; letter-spacing: 0.2em; text-align: center; transition: border-color 0.15s; }
    input:focus { outline: none; border-color: var(--accent); }
    .field-error { font-size: 0.75rem; color: var(--error); margin-top: 0.3rem; }
    .flow-messages { margin-bottom: 1rem; }
    .flow-message { font-size: 0.8125rem; padding: 0.6rem 0.875rem; border-radius: 6px; margin-bottom: 0.5rem; }
    .flow-message.error { background: rgba(248,113,113,0.12); color: var(--error); }
    .flow-message.success { background: rgba(74,222,128,0.12); color: var(--success); }
    .flow-message.info { background: rgba(99,102,241,0.12); color: #a5b4fc; }
    .btn { display: block; width: 100%; padding: 0.75rem; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-family: inherit; font-size: 0.9375rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: background 0.15s; }
    .btn:hover { background: var(--accent-hover); }
    .links { display: flex; justify-content: center; margin-top: 1.25rem; font-size: 0.8125rem; }
    .links a { color: var(--accent); text-decoration: none; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="wordmark">Auth Service</div>

  <div class="card">
    <h1>Verify your email</h1>
    <p class="subtitle">Enter the 6-digit code we sent to your email address.</p>

    <div class="flow-messages" id="flow-messages"></div>

    <form id="verify-form" method="POST" action="">
      <input type="hidden" name="csrf_token" id="csrf-token">

      <div class="field">
        <label for="code">Verification code</label>
        <input type="text" id="code" name="code"
               autocomplete="one-time-code" inputmode="numeric"
               maxlength="6" placeholder="000000" required>
        <div class="field-error hidden" id="err-code"></div>
      </div>

      <input type="hidden" name="method" value="code">

      <button type="submit" class="btn">Verify email</button>
    </form>

    <div class="links">
      <a href="/login">Back to sign in</a>
    </div>
  </div>

  <script>
    const KRATOS = 'http://localhost:4433';
    const params = new URLSearchParams(location.search);
    const flowId = params.get('flow');

    if (!flowId) {
      location.replace(`${KRATOS}/self-service/verification/browser`);
    } else {
      fetch(`${KRATOS}/self-service/verification/flows?id=${flowId}`, {
        credentials: 'include',
        headers: { Accept: 'application/json' }
      })
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(flow => {
        const form = document.getElementById('verify-form');
        form.action = flow.ui.action;

        const csrfNode = flow.ui.nodes.find(n => n.attributes?.name === 'csrf_token');
        if (csrfNode) document.getElementById('csrf-token').value = csrfNode.attributes.value;

        const msgs = document.getElementById('flow-messages');
        (flow.ui.messages || []).forEach(m => {
          const el = document.createElement('div');
          el.className = `flow-message ${m.type || 'info'}`;
          el.textContent = m.text;
          msgs.appendChild(el);
        });

        flow.ui.nodes.forEach(node => {
          const name = node.attributes?.name;
          const errEl = document.getElementById(`err-${name}`);
          if (errEl && node.messages?.length) {
            errEl.textContent = node.messages.map(m => m.text).join(' ');
            errEl.classList.remove('hidden');
          }
        });
      })
      .catch(() => location.replace('/verification'));
    }
  </script>
</body>
</html>
